

services:
  db:
    image: postgres:15
    container_name: postgres-moss
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moss
    ports:
      - "51213:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:   # ✅ debe estar alineado con db, dentro de services
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  postgres_data:
